<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Namorados</title>
</head>
<body>
    <header>
        <nav>
            <div class="logo">pagina de prova</div>
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#galeria">Galeria</a></li>
                <li><a href="#contatos">Contatos</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="galeria">
            <h2>Nossa Galeria</h2>
            <div class="galeria">
                <div class="galeria-item">
                    <img src="https://picsum.photos/600/400?random=1" alt="Natureza 1" class="img-clicavel">
                </div>
                <div class="galeria-item"></div>
                    <img src="https://picsum.photos/600/400?random=2" alt="Natureza 1" class="img-clicavel">
                </div>
                <div class="galeria-item"></div>
                    <img src="https://picsum.photos/600/400?random=3" alt="Natureza 1" class="img-clicavel">
                </div>
                <div class="galeria-item"></div>
                    <img src="https://picsum.photos/600/400?random=4" alt="Natureza 1" class="img-clicavel">
                </div>
                <div class="galeria-item"></div>
                    <img src="https://picsum.photos/600/400?random=5" alt="Natureza 1" class="img-clicavel">
                </div>
            </div>
        </section>

        <section id="contatos">
            <h2>Fale conosco</h2>
            <div class="contato-container">
            <div class="contato-info">
                <h3>Informações</h3>
                <br><strong>Endereço:</strong>
                <p>Senai-Floripa</p>
            </div>
        </section>

        <div class="contato-form" id="meuformulario">
            <div class="form-group">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" required placeholder="Digite seu nome">
            </div>
            <div class="form-group">
                <label for="email">Email:</label>
                <input type="text" id="email" required placeholder="Digite seu email:">
            </div>
            <div class="form-group">
                <label for="telefone">Telefone:</label>
                <input type="text" id="telefone" required placeholder="Digite seu telefone:">
            </div>
            <div class="form-group">
                <label for="mensagem">Mensagem:</label>
                <input type="text" id="mensagem" required placeholder="Digite sua mensagem:">
            </div>
            <button type="submit">Encaminhar mensagem</button>
        </div>
        </form>
    </main>
</section>
    
    </main>

    <footer>
        <p>&copy; 2026-feito por Nami</p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
